name: vault-3

# ── Phase 3a: Prometheus scrape (TODO host-side config edit) ──────────
# See vault.yml for the full instructions. On ds-2:
#   sudo $EDITOR /nfs/dockermaster/docker/vault/vault-3/config/config.hcl
#   Add a telemetry block with unauthenticated_metrics_access = true.
#   Then `docker compose restart vault-3`.
# ──────────────────────────────────────────────────────────────────────

networks:
  servers-net:
    name: docker-servers-net
    external: true

volumes:
  vault_raft:
    driver: local
    driver_opts:
      type: none
      device: /var/lib/vault/raft
      o: bind

services:
  vault-3:
    image: hashicorp/vault:1.21
    container_name: vault-3
    hostname: vault-3
    restart: unless-stopped
    networks:
      servers-net:
        ipv4_address: 192.168.59.15
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault"]
    command:
      - server
      - -config=/vault/config/config.hcl
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - /nfs/dockermaster/docker/vault/vault-3/config:/vault/config
      - vault_raft:/vault/raft
      - /nfs/dockermaster/docker/vault/vault-3/logs:/vault/logs
      - /nfs/dockermaster/docker/vault/vault/snapshots:/vault/snapshots
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "vault-3"
      com.docker.service: "vault-3"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
