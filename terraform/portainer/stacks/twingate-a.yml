name: twingate-A

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  twingate:
    container_name: twingate-sepia-hornet
    # Image updates handled by watchtower (label below); skip pull on every
    # redeploy to avoid transient registry "Proxy failure" errors during
    # `compose up`. Image cache survives container removal.
    pull_policy: missing
    image: twingate/connector:1
    hostname: sepia-hornet
    networks:
      servers-net:
        ipv4_address: 192.168.59.12
    # macvlan containers can't use docker's embedded dns at 127.0.0.11
    # because that address is only routed inside bridge networks. without
    # explicit dns, twingate's libsdwan/pubnub-lib can't resolve its
    # control-plane endpoints and flaps Offline/Authentication/Online.
    dns:
      - 192.168.48.1  # pfSense Unbound on SRVAN — internal + public
      - 1.1.1.1       # Cloudflare fallback
    environment:
      TWINGATE_NETWORK: "lamaral"
      TWINGATE_LABEL_HOSTNAME: "sepia-hornet"
      TWINGATE_LABEL_DEPLOYED_BY: "dockerserver-1"
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "twingate-sepia-hornet"
      com.docker.service: "twingate-connector-0"
      portainer.autodeploy: "false"  # Prevent auto-deploy to avoid runner disruption
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
