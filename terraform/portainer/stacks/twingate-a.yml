name: twingate-A

networks:
  servers-net:
    name: docker-servers-net
    external: true
  rproxy:
    name: rproxy
    external: true

services:
  twingate:
    container_name: twingate-sepia-hornet
    pull_policy: always
    image: twingate/connector:1
    hostname: sepia-hornet
    networks:
      rproxy:
      servers-net:
        ipv4_address: 192.168.59.12
    environment:
      TWINGATE_NETWORK: "lamaral"
      TWINGATE_LABEL_HOSTNAME: "sepia-hornet"
      TWINGATE_LABEL_DEPLOYED_BY: "dockermaster"
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
    restart: unless-stopped
    labels:
      com.lcamaral.home.watchtower.enable: "false"  # Manual updates only
      com.docker.stack: "twingate-sepia-hornet"
      com.docker.service: "twingate-connector-0"
      portainer.autodeploy: "false"  # Prevent auto-deploy to avoid runner disruption
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
