name: orbital-sync

# Pi-hole gravity DB + adlist sync from pihole-1 (primary) to
# pihole-2/pihole-3 (secondaries). Pulls hourly via Pi-hole HTTP
# Teleporter API. Self-scheduled — no external cron required.
#
# Runs on dockerserver-1 with default bridge networking; only needs
# outbound HTTP to the three pihole IPs over LAN.
#
# orbital-sync does NOT sync /etc/dnsmasq.d/*.conf — those records
# are managed independently via the bind-mounted file in each
# pihole stack (see pihole-2.yml / pihole-3.yml).

services:
  orbital-sync:
    image: mattwebbio/orbital-sync:1.5.0
    container_name: orbital-sync
    restart: unless-stopped
    environment:
      PRIMARY_HOST_BASE_URL: "http://192.168.100.254"
      PRIMARY_HOST_PASSWORD: ${PIHOLE_PASSWORD}
      SECONDARY_HOST_1_BASE_URL: "http://192.168.59.50"
      SECONDARY_HOST_1_PASSWORD: ${PIHOLE_PASSWORD}
      SECONDARY_HOST_2_BASE_URL: "http://192.168.4.236"
      SECONDARY_HOST_2_PASSWORD: ${PIHOLE_PASSWORD}
      INTERVAL_MINUTES: "60"
      VERBOSE: "true"
      HONEYBADGER_API_KEY: ""
      SENTRY_DSN: ""
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "orbital-sync"
      com.docker.service: "orbital-sync"
      portainer.autodeploy: "false"
