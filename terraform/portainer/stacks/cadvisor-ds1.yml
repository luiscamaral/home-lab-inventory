name: cadvisor-ds1

# cadvisor on ds-1 — container-level metrics (per-container CPU/mem/io).
# Decoupled from legacy prometheus stack; Phase 3 adds ds-2 + dockermaster.
#
# Uses host networking and privileged + device access — required to read
# Docker stats via cgroups and /var/lib/docker.

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    hostname: cadvisor-ds1
    network_mode: host
    privileged: true
    command:
      - '--listen_ip=0.0.0.0'
      - '--port=8080'
      - '--docker_only=true'
      - '--store_container_labels=false'
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      loki.logging: "true"
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "cadvisor-ds1"
      com.docker.service: "cadvisor"
      portainer.autodeploy: "false"
