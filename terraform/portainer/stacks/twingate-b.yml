name: twingate-B

networks:
  servers-net:
    name: docker-servers-net
    external: true
  rproxy:
    name: rproxy
    external: true

services:
  twingate:
    container_name: twingate-golden-mussel
    pull_policy: always
    image: twingate/connector:1
    hostname: golden-mussel
    networks:
      rproxy:
      servers-net:
        ipv4_address: 192.168.59.24
    environment:
      TWINGATE_NETWORK: "lamaral"
      TWINGATE_LABEL_HOSTNAME: "golden-mussel"
      TWINGATE_LABEL_DEPLOYED_BY: "dockermaster"
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "twingate-golden-mussel"
      com.docker.service: "twingate-connector-1"
      portainer.autodeploy: "false"  # Prevent auto-deploy to avoid runner disruption
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
