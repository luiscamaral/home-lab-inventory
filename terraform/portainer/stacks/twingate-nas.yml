name: twingate-nas

# Twingate connector "fresh-marmoset" on NAS — third connector in the
# active-active fleet (sepia-hornet on ds-1, golden-mussel on ds-2).
# Tokens come from Vault `secret/homelab/twingate/fresh-marmoset` via
# the portainer_stack env block (NOT in this file).
#
# Pinned to 192.168.1.4/02:42:c0:a8:01:04 on `home-net` macvlan. Note
# the .1.4 IP sits OUTSIDE the home-net IPRange (192.168.4.232/29) but
# Docker macvlan accepts explicit ipv4_address outside the dynamic pool.

networks:
  home-net:
    external: true

services:
  twingate-connector:
    image: twingate/connector:1
    container_name: tg-fresh-marmoset
    hostname: fresh-marmoset
    pull_policy: missing
    # MAC pinning not supported by NAS Docker engine (API 1.43); see
    # openspeedtest.yml for context. Stable IP only.
    networks:
      home-net:
        ipv4_address: 192.168.1.4
    dns:
      - 192.168.4.1   # pfSense Unbound — internal + public
      - 1.1.1.1       # Cloudflare fallback
    environment:
      TWINGATE_NETWORK: ${TWINGATE_NETWORK}
      TWINGATE_LABEL_HOSTNAME: "fresh-marmoset"
      TWINGATE_LABEL_DEPLOYED_BY: "nas"
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
      TWINGATE_METRICS_PORT: "9999"
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "twingate-fresh-marmoset"
      com.docker.service: "twingate-connector"
      portainer.autodeploy: "false"
    # No `deploy.resources` block: NAS Synology kernel lacks CPU CFS
    # quotas, Docker rejects NanoCPUs limits.
