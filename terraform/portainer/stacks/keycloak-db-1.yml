name: keycloak-db-1

# PostgreSQL HA cluster node 1 (standby) on dockerserver-1
# Will sync from keycloak-db-0 via pg_basebackup then stream WAL

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  postgresql:
    image: bitnamilegacy/postgresql-repmgr:17.6.0
    container_name: keycloak-db-1
    hostname: keycloak-db-1
    networks:
      servers-net:
        ipv4_address: 192.168.59.54
    volumes:
      - /var/lib/keycloak-ha/db-1:/bitnami/postgresql
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRESQL_USERNAME: keycloak
      POSTGRESQL_PASSWORD: ${DB_PASSWORD}
      POSTGRESQL_DATABASE: keycloak
      REPMGR_PASSWORD: ${REPMGR_PASSWORD}
      REPMGR_PRIMARY_HOST: 192.168.59.44
      REPMGR_PRIMARY_PORT: 5432
      REPMGR_PARTNER_NODES: 192.168.59.44,192.168.59.54
      REPMGR_NODE_NAME: keycloak-db-1
      REPMGR_NODE_NETWORK_NAME: 192.168.59.54
      REPMGR_PORT_NUMBER: 5432
      REPMGR_USERNAME: repmgr
      REPMGR_DATABASE: repmgr
      POSTGRESQL_PORT_NUMBER: 5432
      # Same pg_ctl timeout extension as db-0 — used when this node is
      # rebuilt as standby after a long gap (see keycloak-db-0.yml).
      POSTGRESQL_PGCTLTIMEOUT: "600"
      # See keycloak-db-0.yml — wal_sender_timeout=0 needs to survive a
      # role swap, so set it on this node too.
      POSTGRESQL_EXTRA_FLAGS: "-c wal_sender_timeout=0"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "keycloak-db-1"
      com.docker.service: "postgresql"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
