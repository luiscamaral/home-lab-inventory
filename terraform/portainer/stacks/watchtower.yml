name: watchtower

networks:
  watchtower-internal:
  # Phase 3a: dual-home onto macvlan so Prometheus can reach the HTTP API
  # on :8080. The IP is per-host (.33 dm, .36 ds-1) — injected via the
  # WATCHTOWER_MACVLAN_IP env var from Terraform. See stacks.tf.
  servers-net:
    name: docker-servers-net
    external: true

services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    hostname: watchtower
    networks:
      watchtower-internal:
      servers-net:
        ipv4_address: ${WATCHTOWER_MACVLAN_IP}
    environment:
      DOCKER_API_VERSION: "1.40"
      TZ: America/Denver
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "watchtower"
      com.docker.service: "watchtower"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
