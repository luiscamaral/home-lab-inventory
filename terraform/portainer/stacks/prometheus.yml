name: prometheus

volumes:
  prometheus_data: {}

networks:
  back-tier:

services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus_data:/prometheus
      - /nfs/dockermaster/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - 9090:9090
    networks:
      back-tier:
    depends_on:
      - cadvisor
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "prometheus"
      com.docker.service: "prometheus"
      portainer.autodeploy: "false"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    ports:
      - 9100:9100
    networks:
      - back-tier
    restart: always
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "prometheus"
      com.docker.service: "node-exporter"

  snmp-exporter:
    image: prom/snmp-exporter:v0.20.0
    command: --config.file=/etc/snmp_exporter/snmp.yml
    volumes:
      - /nfs/dockermaster/docker/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml
    networks:
      back-tier:
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9116/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "prometheus"
      com.docker.service: "snmp-exporter"

  alertmanager:
    image: prom/alertmanager
    volumes:
      - /nfs/dockermaster/docker/prometheus/alertmanager:/etc/alertmanager
    networks:
      - back-tier
    restart: always
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "prometheus"
      com.docker.service: "alertmanager"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    devices:
      - /dev/kmsg
    networks:
      - back-tier
    restart: always
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "prometheus"
      com.docker.service: "cadvisor"
