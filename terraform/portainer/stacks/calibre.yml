name: calibre

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  calibre:
    image: linuxserver/calibre:latest
    hostname: calibre
    container_name: calibre
    shm_size: '2gb'
    networks:
      servers-net:
        ipv4_address: 192.168.59.7
    ports:
      - 58090:9090
    volumes:
      - /nfs/calibre/Library:/Library
      - /nfs/calibre/config:/config
      - /nfs/calibre/upload:/upload
      - /nfs/calibre/plugins:/plugins
      - /nfs/dockermaster/docker/calibre-server/10-keyboard.conf:/etc/X11/xorg.conf.d/10-keyboard.conf
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp:unconfined
    environment:
      PUID: 1027
      PGID: 65539
      CUSTOM_USER: 'admin'
      PASSWORD: ${CALIBRE_PASSWORD}
      TZ: 'America/Denver'
      DISABLE_IPV6: true
      LANG: en_US.UTF-8
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -s --max-time 5 -o /dev/null -w '%{http_code}' http://localhost:8080/ | grep -qE '^(200|401)$'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "calibre"
      com.docker.service: "calibre"
      portainer.autodeploy: "false"

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    hostname: calibre-web
    networks:
      servers-net:
        ipv4_address: 192.168.59.6
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - /nfs/calibre/calibre-web/config:/config
      - /nfs/calibre/calibre-web/Library:/books
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs --max-time 5 http://localhost:8083/login -o /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "calibre"
      com.docker.service: "calibre-web"
      portainer.autodeploy: "false"
