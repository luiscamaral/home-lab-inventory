name: keycloak-2

# Keycloak node 2 (on dockerserver-1) — part of the 2-node Infinispan cluster
# with keycloak on dockermaster. Peer discovery via JDBC_PING.

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  keycloak:
    image: keycloak/keycloak:26.3
    container_name: keycloak-2
    hostname: keycloak-2
    command: start
    networks:
      servers-net:
        ipv4_address: 192.168.59.43
    environment:
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://${KC_HOSTNAME}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://192.168.59.44:5432,192.168.59.54:5432/keycloak?targetServerType=primary&loadBalanceHosts=false
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_CACHE: ispn
      KC_CACHE_STACK: jdbc-ping
      JAVA_OPTS_APPEND: "-Djgroups.bind_addr=192.168.59.43"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "keycloak-2"
      com.docker.service: "keycloak"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1250M
