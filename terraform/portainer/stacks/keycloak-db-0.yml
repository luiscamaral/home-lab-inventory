name: keycloak-db-0

# PostgreSQL HA cluster node 0 (primary) on dockermaster
# Uses bitnami/postgresql-repmgr for streaming replication + auto-failover
# Partner: keycloak-db-1 on dockerserver-1

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  postgresql:
    image: bitnamilegacy/postgresql-repmgr:17.6.0
    container_name: keycloak-db-0
    hostname: keycloak-db-0
    networks:
      servers-net:
        ipv4_address: 192.168.59.44
    volumes:
      - /nfs/dockermaster/docker/keycloak-ha/db-0:/bitnami/postgresql
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRESQL_USERNAME: keycloak
      POSTGRESQL_PASSWORD: ${DB_PASSWORD}
      POSTGRESQL_DATABASE: keycloak
      REPMGR_PASSWORD: ${REPMGR_PASSWORD}
      REPMGR_PRIMARY_HOST: 192.168.59.44
      REPMGR_PRIMARY_PORT: 5432
      REPMGR_PARTNER_NODES: 192.168.59.44,192.168.59.54
      REPMGR_NODE_NAME: keycloak-db-0
      REPMGR_NODE_NETWORK_NAME: 192.168.59.44
      REPMGR_PORT_NUMBER: 5432
      REPMGR_USERNAME: repmgr
      REPMGR_DATABASE: repmgr
      POSTGRESQL_PORT_NUMBER: 5432
      # Extend the pg_isready wait during startup to allow for long WAL replay
      # when rejoining as a standby after extended downtime. Default is 60s,
      # which is too short when replaying a large catch-up after clone.
      POSTGRESQL_PGCTLTIMEOUT: "600"
      # Disable wal_sender_timeout so the standby's catch-up doesn't get
      # killed mid-stream during very long WAL replay windows. Set on
      # BOTH nodes (not just the current primary) so it survives a role
      # swap. Was previously set live via ALTER SYSTEM only and lost on
      # data-volume rebuild — see memory reference_bitnami_postgres_repmgr.md.
      POSTGRESQL_EXTRA_FLAGS: "-c wal_sender_timeout=0"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "keycloak-db-0"
      com.docker.service: "postgresql"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
