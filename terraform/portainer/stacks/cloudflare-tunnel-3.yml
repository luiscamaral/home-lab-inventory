name: cloudflare-tunnel-3

# Third replica of the cloudflare tunnel (bologna) running on dockerserver-2.
# Cloudflare load-balances across all 3 tunnel replicas.

networks:
  rproxy:
    name: rproxy
    external: true

services:
  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel-3
    command: tunnel --no-autoupdate --metrics 0.0.0.0:9080 run --token ${TUNNEL_TOKEN}
    networks:
      rproxy:
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 5s
      timeout: 5s
      retries: 15
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "cloudflare-tunnel-3"
      com.docker.service: "tunnel"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
