name: docker-registry

networks:
  rproxy:
    name: rproxy
    external: true
  servers-net:
    name: docker-servers-net
    external: true

services:
  registry:
    image: registry:2
    container_name: registry
    hostname: registry
    networks:
      rproxy:
      servers-net:
        ipv4_address: 192.168.59.16
    expose:
      - 5000
      # Phase 3a: debug HTTP listener for Prometheus /metrics scrape.
      # NOTE: The listener only binds when the registry's config.yml has
      # `http.debug.addr=:5001` AND `http.debug.prometheus.enabled=true`.
      # config.yml lives on the host (NOT in this repo) at:
      #   /nfs/dockermaster/docker/registry/config.yml
      # TODO: ssh dockermaster, edit that file to add:
      #   http:
      #     debug:
      #       addr: :5001
      #       prometheus:
      #         enabled: true
      #         path: /metrics
      # Then `docker compose restart registry`. Until that is done, the
      # `registry` Prometheus job will be up=0 (port closed). See
      # https://distribution.github.io/distribution/about/configuration/#http
      - 5001
    volumes:
      - /nfs/dockermaster/docker/registry/data:/var/lib/registry
      - /nfs/dockermaster/docker/registry/auth:/auth:ro
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qS http://localhost:5000/v2/ 2>&1 | grep -q '200\\|401'"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "registry"
      com.docker.service: "registry"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
