name: cloudflare-tunnel

networks:
  rproxy:
    name: rproxy
    external: true
  servers-net:
    name: docker-servers-net
    external: true

services:
  cloudflare:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --metrics 0.0.0.0:9080 run --token ${TUNNEL_TOKEN}
    networks:
      rproxy:
      # Phase 3a: dual-home onto macvlan so Prometheus can reach :9080/metrics
      servers-net:
        ipv4_address: 192.168.59.30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 5s
      timeout: 5s
      retries: 15
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.docker.stack: "cloudflare"
      com.docker.service: "tunnel"
      portainer.autodeploy: "false"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
