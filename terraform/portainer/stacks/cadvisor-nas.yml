name: cadvisor-nas

# cadvisor on the Synology NAS — container-level metrics for DSM containers.
#
# Differences from the vanilla Linux ds-1/ds-2/dockermaster stacks:
#   - Docker root on DSM is /volume2/@docker, NOT /var/lib/docker
#     (the latter doesn't exist on DSM). Mount the actual path so cadvisor
#     can read container rootfs/overlay metadata.
#   - /dev/disk does not exist on DSM (no udev) — that mount is dropped.
#     Disk I/O metrics still come from /sys block devices.
#   - /var/run on DSM is a symlink to /run; the bind still works because
#     docker resolves it on the host side.
#
# privileged + /dev/kmsg + cgroups access still work on DSM. host networking
# also works on DSM. cadvisor listens on 0.0.0.0:8080 — Prometheus scrapes
# via the NAS host IP (192.168.4.235 on home-net).

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    hostname: cadvisor-nas
    network_mode: host
    privileged: true
    command:
      - '--listen_ip=0.0.0.0'
      - '--port=8080'
      - '--docker_only=true'
      - '--store_container_labels=false'
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /volume2/@docker:/var/lib/docker:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      loki.logging: "true"
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "cadvisor-nas"
      com.docker.service: "cadvisor"
      portainer.autodeploy: "false"
