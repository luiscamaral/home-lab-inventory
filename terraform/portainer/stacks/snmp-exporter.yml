name: snmp-exporter

# snmp-exporter on ds-1 — generic SNMP metrics gateway used by the Prometheus
# `snmp_exporter` job pattern (relabel __address__ to the SNMP target, point
# Prometheus at this service, exporter walks the device).
#
# Decoupled from the legacy prometheus stack. Currently scrapes pfSense via
# the pfsense module (defined in snmp.yml).
#
# Config note: the generated snmp.yml is ~17k lines and tool-produced — too
# large to inline via configs:. We bind-mount it from a stable path on the
# ds-1 NFS share. The legacy file lives at
# /nfs/dockermaster/docker/prometheus/snmp.yml today; on Phase 1 deploy it
# must be copied (or symlinked) to /nfs/dockermaster/docker/snmp-exporter/
# so the legacy stack can be torn down without breaking SNMP scrapes.
#
# TODO (orchestrator): pre-stage snmp.yml at the new path before apply.

networks:
  servers-net:
    name: docker-servers-net
    external: true

services:
  snmp-exporter:
    image: quay.io/prometheus/snmp-exporter:v0.30.1
    hostname: snmp-exporter
    networks:
      servers-net:
        # IP picked from 192.168.59.0/26 free pool (see stacks.tf header)
        ipv4_address: 192.168.59.29
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'
      - '--web.listen-address=:9116'
    volumes:
      - /nfs/dockermaster/docker/snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    expose:
      - "9116"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9116/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      loki.logging: "true"
      com.centurylinklabs.watchtower.enable: "false"
      com.docker.stack: "snmp-exporter"
      com.docker.service: "snmp-exporter"
      portainer.autodeploy: "false"
