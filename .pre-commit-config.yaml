# Pre-commit hooks configuration for home-lab-inventory repository
# Run 'pre-commit install' to set up the hooks

repos:
  # Built-in pre-commit hooks for general file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # File formatting and cleanup
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: fix-byte-order-marker

      # File size and merge conflicts
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict

      # JSON/YAML syntax checking
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        exclude: ^(.vscode/|.claude/|.devcontainer/)

      # Shell script checking
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # YAML linting with yamllint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]
        types: [yaml]

  # Markdown linting
  # `mcp/` and `generated/` hold AI-tooling artifacts (PRDs, plans,
  # captured snapshots) that pre-date strict markdownlint adoption;
  # excluded so they don't gate commits. Audit/clean-up tracked separately.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.json]
        types: [markdown]
        exclude: ^(.history/|CHANGELOG\.md|\.github/ISSUE_TEMPLATE/|\.github/PULL_REQUEST_TEMPLATE\.md|mcp/|generated/|\.devin/)

  # Dockerfile linting with hadolint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        # DL3007 (use specific tag, not :latest) and DL3027 (apt vs
        # apt-get) currently flag the calibre-server Dockerfile; both
        # require Dockerfile rewrites that are out of scope for the CI
        # cleanup. Tracked for follow-up.
        args:
          - --ignore=DL3008
          - --ignore=DL3009
          - --ignore=DL3015
          - --ignore=DL3007
          - --ignore=DL3027

  # Shell script linting with shellcheck
  # `--severity=error` matches the CI workflow `Lint Validation (shell)` job.
  # Pre-existing warning/info-level findings (SC2155, SC2086 in SSH-using
  # scripts, etc.) are tracked separately and not gating commits.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=error, -e, SC1091, -e, SC2034, -e, SC2154]
        types: [shell]

  # Git security: check for secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Docker Compose validation
  - repo: local
    hooks:
      - id: docker-compose-check
        name: Docker Compose Check
        entry: bash -c 'for file in "$@"; do docker compose -f "$file" config --quiet || exit 1; done'
        language: system
        files: docker-compose\.ya?ml$
        require_serial: false

  # Validate GitHub Actions workflows
  - repo: local
    hooks:
      - id: actionlint
        name: GitHub Actions Lint
        entry: bash -c 'command -v actionlint >/dev/null 2>&1 && actionlint "$@" || echo "actionlint not installed, skipping GitHub Actions validation"'
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        require_serial: false

# Global configuration
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0

# Files to exclude from all hooks
# NOTE: terraform/portainer/stacks/bind-dns.yml is git-deleted but Synology
# Drive keeps re-materializing an unreadable HFS-compressed pointer that
# fails every hook with "Stale NFS file handle" — exclude it permanently.
exclude: |
  (?x)^(
    \.git/.*|
    \.history/.*|
    \.claude/.*|
    \.vscode/.*|
    \.devcontainer/.*|
    node_modules/.*|
    __pycache__/.*|
    \.pytest_cache/.*|
    terraform/portainer/stacks/bind-dns\.yml|
    .*\.log|
    .*\.tmp|
    .*\.bak
  )$
