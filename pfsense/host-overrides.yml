# pfSense DNS Resolver Host Overrides — single source of truth
#
# This file is the canonical source for static DNS records that need to
# be served from BOTH pfSense Unbound (for clients that resolve directly
# via pfSense — e.g. ADMIN VLAN devices, twingate connectors) AND the
# pihole HA trio (for everything else routed through DHCP option DNS).
#
# Workflow:
#   1. Edit this file
#   2. Run: scripts/sync-host-overrides.py [--apply]
#      - Generates pihole/dnsmasq.d/06-host-overrides.conf
#      - Diffs against pfSense, applies via REST API (with --apply)
#   3. terraform -chdir=terraform/portainer apply  (rolls dnsmasq.d to pihole-2/-3)
#   4. Manually push 06-host-overrides.conf to pihole-1 LXC
#      (see pihole/README.md "Manual deploy" section)
#   5. Commit the YAML + the generated dnsmasq.d file together
#
# Format notes:
#   - host: short hostname (no domain part)
#   - domain: zone the entry belongs to
#   - ip: A record value. For multi-value, use a YAML list. (pfSense
#     also accepts comma-separated, but list form is cleaner.)
#   - description: optional, surfaces in pfSense GUI
#   - aliases: optional list of additional names that point at the same IP

