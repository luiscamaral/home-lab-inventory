# Local development override for Docker Desktop
# Use with: docker compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  litellm:
    # Override volumes for local development
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./litellm-config-ollama.yaml:/app/litellm-config-ollama.yaml
    # Use host network to access local Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://llmproxy:${POSTGRES_PASSWORD:-}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      # Enable debug logging for local testing
      LITELLM_LOG: "DEBUG"
      # Set master key for API access
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-test-master-key-123}"
    # Override resource limits for local testing
    deploy:
      resources:
        limits:
          cpus: '1.0'  # Reduced for local testing
          memory: 1G    # Reduced for local testing
        reservations:
          cpus: '0.25'
          memory: 256M

  db:
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    # Override resource limits for local testing
    deploy:
      resources:
        limits:
          cpus: '0.5'  # Reduced for local testing
          memory: 512M  # Reduced for local testing
        reservations:
          cpus: '0.1'
          memory: 128M
    # Simplified PostgreSQL config for local
    command: [
      "postgres",
      "-c", "shared_buffers=128MB",
      "-c", "max_connections=100",
      "-c", "effective_cache_size=256MB"
    ]

  prometheus:
    # Override resource limits for local testing
    deploy:
      resources:
        limits:
          cpus: '0.5'  # Reduced for local testing
          memory: 512M  # Reduced for local testing
        reservations:
          cpus: '0.1'
          memory: 128M

  # Additional service for testing with Ollama
  ollama-test:
    image: curlimages/curl:latest
    container_name: ollama_test
    depends_on:
      litellm:
        condition: service_healthy
    command: |
      sh -c "
        echo 'Waiting for LiteILM to be ready...' &&
        sleep 10 &&
        echo 'Testing Ollama through LiteILM...' &&
        curl -X POST http://litellm:4000/chat/completions \
          -H 'Content-Type: application/json' \
          -H 'Authorization: Bearer ${LITELLM_MASTER_KEY:-sk-test-master-key-123}' \
          -d '{
            \"model\": \"ollama/llama3.2\",
            \"messages\": [{\"role\": \"user\", \"content\": \"Hello, this is a test\"}],
            \"max_tokens\": 50
          }' &&
        echo 'Test completed!'
      "
    profiles:
      - test

volumes:
  # Override with local volumes for testing
  prometheus_data:
    driver: local
    driver_opts: {}  # Remove NFS mount
  postgres_data:
    driver: local
    driver_opts: {}  # Remove NFS mount