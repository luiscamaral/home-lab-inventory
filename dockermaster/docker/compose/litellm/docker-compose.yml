name: litellm

services:
  litellm:
    build:
      context: .
      args:
        target: runtime
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: on-failure:5  # Restart on failure, max 5 attempts
    #########################################
    ## Config file mounted ##
    volumes:
      - ./config.yaml:/app/config.yaml
    ##############################################
    expose:
      - "4000"  # Exposed only on docker-servers-net IP
    environment:
      DATABASE_URL: "postgresql://llmproxy:${POSTGRES_PASSWORD}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG: ${LITELLM_LOG}
      OLLAMA_HOST: ${OLLAMA_HOST}
      LITELLM_CONFIG_PATH: "/app/config.yaml"
    env_file:
      - .env # Load local .env file
    depends_on:
      db:  # Enhanced dependency with condition
        condition: service_healthy
    healthcheck:  # Enhanced health check configuration
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4000/health/liveliness || exit 1" ]
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 5     # Retry up to 5 times if health check fails
      start_period: 60s  # Wait 60 seconds after container start before beginning health checks
    deploy:
      resources:
        limits:
          cpus: '2.0'  # Maximum 2 CPU cores
          memory: 2G    # Maximum 2GB RAM
        reservations:
          cpus: '0.5'  # Reserve 0.5 CPU cores
          memory: 512M  # Reserve 512MB RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
      docker-servers-net:
        ipv4_address: 192.168.59.41

  db:
    image: postgres:16
    restart: on-failure:5  # Restart on failure, max 5 attempts
    container_name: litellm_db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    # No external ports - internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists Postgres data across container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Give database time to initialize
    deploy:
      resources:
        limits:
          cpus: '1.0'  # Maximum 1 CPU core
          memory: 1G    # Maximum 1GB RAM
        reservations:
          cpus: '0.25'  # Reserve 0.25 CPU cores
          memory: 256M  # Reserve 256MB RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
    command: [
      "postgres",
      "-c", "shared_buffers=256MB",
      "-c", "max_connections=200",
      "-c", "effective_cache_size=512MB",
      "-c", "maintenance_work_mem=64MB",
      "-c", "checkpoint_completion_target=0.9",
      "-c", "wal_buffers=16MB",
      "-c", "default_statistics_target=100",
      "-c", "random_page_cost=1.1",
      "-c", "effective_io_concurrency=200",
      "-c", "work_mem=1310kB",
      "-c", "min_wal_size=1GB",
      "-c", "max_wal_size=4GB"
    ]

  prometheus:
    image: prom/prometheus:latest
    container_name: litellm_prometheus
    restart: on-failure:5  # Restart on failure, max 5 attempts
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro  # Read-only config
    # No external ports - internal only
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=10GB"  # Max storage size
      - "--web.enable-lifecycle"  # Enable reload via HTTP
      - "--web.enable-admin-api"  # Enable admin API
    depends_on:
      litellm:
        condition: service_healthy  # Wait for litellm to be healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'  # Maximum 1 CPU core
          memory: 1G    # Maximum 1GB RAM
        reservations:
          cpus: '0.25'  # Reserve 0.25 CPU cores
          memory: 256M  # Reserve 256MB RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    user: "65534:65534"  # Run as nobody user for security
    networks:
      default:

volumes:
  prometheus_data:
  postgres_data:

networks:
  default:
    name: rproxy
    external: true
  docker-servers-net:
    name: docker-servers-net
    external: true
