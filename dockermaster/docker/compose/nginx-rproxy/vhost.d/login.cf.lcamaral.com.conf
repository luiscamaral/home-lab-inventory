# Homelab Portal HA — 2 stateless replicas (sessions are encrypted cookies)
upstream homelab_portal {
  least_conn;
  server 192.168.59.18:3000 max_fails=2 fail_timeout=10s;  # portal-1 on dm
  server 192.168.59.38:3000 max_fails=2 fail_timeout=10s;  # portal-2 on ds-1
  keepalive 8;
}

server {
  listen 80;
  server_name login.cf.lcamaral.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name login.cf.lcamaral.com;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    proxy_pass http://homelab_portal;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Fail fast to the other replica
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 2s;

    proxy_read_timeout 60s;
    client_max_body_size 1m;
  }
}
