server {
  listen 80;
  server_name login.cf.lcamaral.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name login.cf.lcamaral.com;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Re-resolve upstream via Docker embedded DNS so stack recreate does not
  # require an nginx reload. See: https://nginx.org/en/docs/http/ngx_http_core_module.html#resolver
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $upstream_portal homelab-portal:3000;

  location / {
    proxy_pass http://$upstream_portal;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 60s;
    client_max_body_size 1m;
  }
}
