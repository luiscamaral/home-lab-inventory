# Keycloak HA upstream — 2-node Infinispan cluster
# Sticky sessions based on AUTH_SESSION_ID cookie (Keycloak's own session
# cookie) so a logged-in user stays on the same node for their session.
# Infinispan replicates the session across both nodes anyway, but sticky
# minimizes cache misses during auth flow.
upstream keycloak_cluster {
  hash $cookie_AUTH_SESSION_ID consistent;
  server 192.168.59.13:8080 max_fails=2 fail_timeout=10s;  # keycloak on dm
  server 192.168.59.43:8080 max_fails=2 fail_timeout=10s;  # keycloak-2 on ds-1
  keepalive 16;
}

server {
  listen 80;
  server_name auth.cf.lcamaral.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name auth.cf.lcamaral.com;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  location / {
    proxy_pass http://keycloak_cluster;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Fail fast + fail over to the other keycloak
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 2s;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;
  }
}
