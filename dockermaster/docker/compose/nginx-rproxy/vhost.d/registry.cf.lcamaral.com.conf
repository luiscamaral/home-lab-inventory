server {
  listen 80;
  server_name registry.cf.lcamaral.com;

  otel_trace_context propagate;

  location / {
    set $upstream_target 192.168.59.16;
    proxy_pass http://$upstream_target:5000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 0;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_request_buffering off;

    otel_trace on;
    otel_trace_context inject;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name registry.cf.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    set $upstream_target 192.168.59.16;
    proxy_pass http://$upstream_target:5000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 0;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_request_buffering off;

    otel_trace on;
    otel_trace_context inject;
  }
}
