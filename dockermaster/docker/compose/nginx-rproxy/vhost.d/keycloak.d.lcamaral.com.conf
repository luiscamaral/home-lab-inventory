server {
  listen 80;
  server_name keycloak.d.lcamaral.com;
  return 301 https://$host$request_uri;
}

# HTTPS — Keycloak
# Phase 3 will add a second instance at 192.168.59.43 with an upstream block
# and cookie-hash sticky sessions
server {
  listen 443 ssl;
  http2 on;
  server_name keycloak.d.lcamaral.com;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  location / {
    set $upstream_server 192.168.59.13;
    proxy_pass http://$upstream_server:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
  }
}
