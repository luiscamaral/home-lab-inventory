server {
  listen 80;
  server_name grafana.d.lcamaral.com;

  otel_trace_context propagate;

  return 301 https://$host$request_uri;
}

# HTTPS Server Block — Grafana on docker-servers-net macvlan (.59.43:3000).
# Phase 4 (2026-04-29). Wildcard *.d.lcamaral.com cert from pfSense ACME.
server {
  listen 443 ssl;
  http2 on;
  server_name grafana.d.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    # `grafana.rproxy` is the FQDN form Docker DNS uses to scope
    # resolution to a specific network. The bare `grafana` returns
    # the macvlan IP (192.168.59.43) which the nginx-rproxy container
    # cannot reach via same-host macvlan. The `.rproxy` suffix forces
    # the bridge-network IP (172.24.x.x) which works.
    proxy_pass http://grafana.rproxy:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Grafana Live (websocket) needs upgrade pass-through
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_hide_header WWW-Authenticate;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on;
    otel_trace_context inject;
  }
}
