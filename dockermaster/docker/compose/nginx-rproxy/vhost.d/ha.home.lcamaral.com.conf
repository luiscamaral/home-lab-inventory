# Home Assistant - Reverse Proxy with WebSocket support
# Upstream: ha.iot.lcamaral.com (192.168.16.2:8123) on IOT VLAN
server {
    listen 80;
    server_name ha.home.lcamaral.com;

    otel_trace_context propagate;

    # Enforce HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # http2 off for WebSocket compatibility
    server_name ha.home.lcamaral.com;

    otel_trace_context propagate;

    # SSL Configuration
    ssl_certificate     /etc/nginx/cert/home.lcamaral.com.fullchain;
    ssl_certificate_key /etc/nginx/cert/home.lcamaral.com.key;
    ssl_trusted_certificate /etc/nginx/cert/home.lcamaral.com.crt;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # HA needs a generous upload size for backups, snapshots, add-on config, etc.
    client_max_body_size 100m;

    # Home Assistant - static upstream IP (IOT VLAN)
    location / {
        set $upstream_ha 192.168.16.2;
        proxy_pass http://$upstream_ha:8123;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WebSocket connections (HA frontend)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time (event stream / WS)
        proxy_buffering off;
        proxy_redirect off;

        otel_trace on;
        otel_trace_context inject;
    }
}
