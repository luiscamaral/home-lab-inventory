# Vault Raft cluster — 3 nodes, any unsealed node can accept requests
# (Vault forwards writes to the leader automatically via request forwarding)
upstream vault_cluster {
  server 192.168.59.25:8200 max_fails=2 fail_timeout=10s;  # vault-1 (dockermaster)
  server 192.168.59.9:8200  max_fails=2 fail_timeout=10s;  # vault-2 (dockerserver-1)
  server 192.168.59.15:8200 max_fails=2 fail_timeout=10s;  # vault-3 (dockerserver-2)
  keepalive 16;
}

server {
  listen 80;
  server_name vault.d.lcamaral.com;

  return 301 https://$host$request_uri;
}

# HTTPS Server Block
server {
  listen 443 ssl;
  http2 on;
  server_name vault.d.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  location / {
    proxy_pass http://vault_cluster;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Fail over to next upstream on connect error, timeout, or server error
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    # Fail fast: connect to a dead backend must fail in 2s so the next upstream is tried
    proxy_connect_timeout 2s;

    proxy_hide_header WWW-Authenticate;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on;
    otel_trace_context inject;
  }
}
