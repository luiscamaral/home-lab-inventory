# MinIO S3 API — load balanced across minio-1 (ds-1) and minio-2 (ds-2)
upstream minio_s3 {
  least_conn;
  server 192.168.59.17:9000;  # minio-1 — dockerserver-1
  server 192.168.59.37:9000;  # minio-2 — dockerserver-2 (site replication peer)
  keepalive 32;
}

server {
  listen 80;
  server_name s3.d.lcamaral.com s3.cf.lcamaral.com;

  otel_trace_context propagate; # Propagate trace headers to upstream services

  # Enforce HTTPS
  return 301 https://$host$request_uri;
}

# HTTPS Server Block
server {
  listen 443 ssl;
  http2 on;
  server_name s3.d.lcamaral.com s3.cf.lcamaral.com;

  otel_trace_context propagate; # Propagate trace headers to upstream services

  # SSL Configuration
  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Optional hardening (tune to your policy)
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    proxy_pass http://minio_s3;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Don't let upstream trigger browser auth prompts
    proxy_hide_header WWW-Authenticate;

    # sensible timeouts/body size
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on; # Enable tracing for this location
    otel_trace_context inject; # Inject W3C trace context into upstream requests
  }
}


server {
  listen 80;
  server_name minio.d.lcamaral.com minio.cf.lcamaral.com;

  otel_trace_context propagate; # Propagate trace headers to upstream services

  # Enforce HTTPS
  return 301 https://$host$request_uri;
}

# HTTPS Server Block — MinIO Console (primary only; site replication keeps both in sync)
server {
  listen 443 ssl;
  http2 on;
  server_name minio.d.lcamaral.com minio.cf.lcamaral.com;

  otel_trace_context propagate; # Propagate trace headers to upstream services

  # SSL Configuration
  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Optional hardening (tune to your policy)
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    set $upstream_target 192.168.59.17;
    proxy_pass http://$upstream_target:9001;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets for console/log streaming
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Don't let upstream trigger browser auth prompts
    proxy_hide_header WWW-Authenticate;

    # sensible timeouts/body size
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on; # Enable tracing for this location
    otel_trace_context inject; # Inject W3C trace context into upstream requests
  }
}
