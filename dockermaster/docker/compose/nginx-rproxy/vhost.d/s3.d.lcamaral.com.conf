# MinIO S3 API — stateless, load-balanced least-conn across both sites
upstream minio_s3 {
  least_conn;
  server 192.168.59.17:9000 max_fails=2 fail_timeout=10s;  # minio-1 (ds-1, NFS)
  server 192.168.59.37:9000 max_fails=2 fail_timeout=10s;  # minio-2 (ds-2, local)
  keepalive 32;
}

# MinIO Console — cookie-hash sticky so a logged-in session stays on one node
# (MinIO uses "token" as the session cookie name). Failover still works: if the
# primary dies, nginx routes to the other; the user must re-login.
upstream minio_console {
  hash $cookie_token consistent;
  server 192.168.59.17:9001 max_fails=2 fail_timeout=10s;  # minio-1 console
  server 192.168.59.37:9001 max_fails=2 fail_timeout=10s;  # minio-2 console
  keepalive 16;
}

server {
  listen 80;
  server_name s3.d.lcamaral.com s3.cf.lcamaral.com;

  otel_trace_context propagate;

  return 301 https://$host$request_uri;
}

# HTTPS — S3 API
server {
  listen 443 ssl;
  http2 on;
  server_name s3.d.lcamaral.com s3.cf.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    proxy_pass http://minio_s3;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Fail over quickly if a backend dies
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 2s;

    proxy_hide_header WWW-Authenticate;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on;
    otel_trace_context inject;
  }
}


server {
  listen 80;
  server_name minio.d.lcamaral.com minio.cf.lcamaral.com;

  otel_trace_context propagate;

  return 301 https://$host$request_uri;
}

# HTTPS — MinIO Console (HA with sticky sessions)
server {
  listen 443 ssl;
  http2 on;
  server_name minio.d.lcamaral.com minio.cf.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    proxy_pass http://minio_console;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets for console log streaming
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Fail over quickly if a console dies (user must re-login)
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 2s;

    proxy_hide_header WWW-Authenticate;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;

    otel_trace on;
    otel_trace_context inject;
  }
}
