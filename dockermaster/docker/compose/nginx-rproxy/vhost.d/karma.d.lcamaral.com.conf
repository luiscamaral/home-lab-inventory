server {
  listen 80;
  server_name karma.d.lcamaral.com;

  otel_trace_context propagate;

  return 301 https://$host$request_uri;
}

# HTTPS Server Block — karma alertmanager UI on docker-servers-net macvlan
# (.59.46:8080). Wildcard *.d.lcamaral.com cert from pfSense ACME.
server {
  listen 443 ssl;
  http2 on;
  server_name karma.d.lcamaral.com;

  otel_trace_context propagate;

  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  location / {
    # karma upstream: macvlan IP (192.168.59.47), reachable from all 3
    # rproxy HA peers via each host's server-net-shim interface.
    proxy_pass http://192.168.59.47:8080;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # karma uses a websocket for live alert push from server -> browser
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_hide_header WWW-Authenticate;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 16m;

    otel_trace on;
    otel_trace_context inject;
  }
}
