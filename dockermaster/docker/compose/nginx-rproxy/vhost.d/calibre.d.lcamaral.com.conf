map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name calibre.d.lcamaral.com;

  # Enforce HTTPS
  return 301 https://$host$request_uri;
}

# HTTPS Server Block
server {
  listen 443 ssl;
  http2 on;
  server_name calibre.d.lcamaral.com;
  otel_trace_context propagate; # Propagate trace headers to upstream services

  # SSL Configuration
  ssl_certificate     /etc/nginx/cert/d.lcamaral.com.fullchain;
  ssl_certificate_key /etc/nginx/cert/d.lcamaral.com.key;
  ssl_trusted_certificate /etc/nginx/cert/d.lcamaral.com.crt;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Optional hardening (tune to your policy)
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  auth_basic off;

  # Existing Location Block (copied from HTTP config)
  location / {

    set $upstream_server 192.168.59.7;
    proxy_pass https://$upstream_server:8181;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets for console/log streaming
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Don't let upstream trigger browser auth prompts
    #proxy_hide_header WWW-Authenticate;

    # sensible timeouts/body size
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100m;
  }
}
