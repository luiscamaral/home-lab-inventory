# This is a top-level directive and MUST be at the beginning of the file.
load_module modules/ngx_otel_module.so;

# Standard NGINX setup
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

error_log  stdout debug;

events {
    worker_connections  1024;
}

http {
    # Basic settings
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket upgrade map - required for WS/WSS proxying
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # OpenTelemetry Exporter Configuration
    # Point this to your OTel collector's address
    otel_exporter {
        endpoint o11y-otelc:4317; # Example: using a Docker service name 'collector'
    }

    # Enable tracing for all requests in this http block
    otel_trace on;
    otel_service_name "rproxy-service"; # Set your service name

    # nginx_status server — stub_status endpoint scraped by the
    # nginx-prometheus-exporter sidecar over the rproxy bridge network.
    # Listens on :8080 INSIDE the container only — not in the `expose:`
    # or `ports:` lists in the Compose stack, so it never reaches the
    # macvlan/host. Access is gated by network ACL: only the rproxy
    # bridge subnet (172.20.0.0/24 — Docker auto-assigns) and 127.0.0.1
    # are allowed.
    server {
        listen 8080;
        server_name _;
        access_log off;
        location /nginx_status {
            stub_status on;
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;   # Docker bridge ranges
            allow 192.168.59.0/24; # docker-servers-net macvlan
            deny all;
        }
    }

    # This line includes any additional server blocks you define in the conf.d directory
    include /etc/nginx/vhost.d/*.conf;
}
