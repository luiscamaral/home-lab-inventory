name: portainer-agent

# Portainer Edge Agent for NAS (Synology)
# Deployed at: /volume2/docker/portainer-agent/
# Connects outbound to Portainer at 192.168.59.2:8000 (WebSocket tunnel)
# NAS cannot be reached directly from dockermaster — edge agent reverses the connection.
#
# EdgeKey embeds: https://192.168.59.2:9443 | 192.168.59.2:8000 | token | endpoint_id=6
# EDGE_ID and EDGE_KEY are stored in Vault at secret/homelab/portainer-nas-agent

services:
  portainer-agent:
    image: portainer/agent:2.39.1
    container_name: portainer-agent
    restart: always
    environment:
      EDGE: "1"
      EDGE_ID: "${EDGE_ID}"
      EDGE_KEY: "${EDGE_KEY}"
      EDGE_INSECURE_POLL: "1"
      AGENT_CLUSTER_ADDR: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume2/@docker/volumes:/var/lib/docker/volumes
    labels:
      com.lcamaral.home.service: "portainer-agent"
      com.lcamaral.home.managed-by: "portainer-edge"
