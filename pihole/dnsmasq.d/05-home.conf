# home zone — migrated from bind9 to pihole on 2026-04-14
#
# Source: dockermaster:/nfs/dockermaster/docker/bind9/config/home.zone
# Bare `home` TLD (not `home.lcamaral.com`) — legacy dev/Docker aliases
# that some local services still resolve. Kept alive through the bind9
# retirement so we don't break callers like docspell.home, n8n.home, etc.
#
# This file lives on each pihole at /etc/dnsmasq.d/05-home.conf and is
# loaded because pihole.toml has misc.etc_dnsmasq_d=true (set via
# FTLCONF_misc_etc_dnsmasq_d env var on the pihole-2/-3 stacks).
#
# IMPORTANT — `lab.home` is a more-specific subdomain that is NOT served
# from this file. Its records live in pihole-1's local DNS toml only.
# pfSense Unbound has a separate `lab.home → 192.168.100.254` domain
# override that handles the longest-prefix match independently.

# Authoritative marker — same loop-prevention as 04-d-lcamaral-com.conf.
# Tells dnsmasq "I own home, do NOT forward unmatched names upstream"
# which would otherwise loop pihole → pfSense → pihole.
local=/home/

# Static service records — point at dockermaster directly
address=/ns1.home/192.168.48.44
address=/hostmaster.home/192.168.48.44
address=/mysql.home/192.168.48.44
address=/mongodb.home/192.168.48.44
address=/app1.home/192.168.48.44
address=/calibre.home/192.168.48.44

# nginx-rproxy fronted services (single-A on dockermaster's rproxy bridge)
address=/docspell.home/192.168.59.28
address=/rundeck.home/192.168.59.28
address=/netbox.home/192.168.59.28
address=/dockermaster.home/192.168.59.28
address=/n8n.home/192.168.59.28

# CNAME alias
cname=app2.home,app1.home
