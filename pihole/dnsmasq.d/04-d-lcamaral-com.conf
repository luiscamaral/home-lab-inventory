# d.lcamaral.com — migrated from bind9 to pihole on 2026-04-13
#
# Source: dockermaster/docker/compose/bind9/d-lcamaral-com.zone (live on
# /nfs/dockermaster/docker/bind9/config — not in git).
#
# Format: dnsmasq `address=/HOST/IP` lines. Multiple address= lines for
# the same hostname produce multi-A records (clients that retry on
# connect failure will fail over among them — same behavior as the
# bind9 multi-A setup for the 3-host nginx rproxy fleet).
#
# This file lives in /etc/pihole/dnsmasq.d/04-d-lcamaral-com.conf on
# the pihole instance(s). Drop a `04-` prefix so it sorts after the
# default pihole files (00-pihole, 01-pihole, 02-pihole, etc.) and
# before any other site-specific overrides.

# Authoritative marker — tells dnsmasq "I own d.lcamaral.com, do NOT
# forward unmatched names upstream." Required to break the loop in
# Pattern B where pihole's upstream is pfSense Unbound which would
# otherwise forward d.lcamaral.com queries back to pihole.
local=/d.lcamaral.com/

# Static service records — point at dockermaster directly
address=/ns1.d.lcamaral.com/192.168.48.44
address=/hostmaster.d.lcamaral.com/192.168.48.44
address=/mysql.d.lcamaral.com/192.168.48.44
address=/mongodb.d.lcamaral.com/192.168.48.44
address=/app1.d.lcamaral.com/192.168.48.44

# rmq (RabbitMQ) — twingate-golden-mussel macvlan IP on ds-2
address=/rmq.d.lcamaral.com/192.168.59.24

# HA nginx reverse proxy — multi-A across the 3 rproxy instances
# rproxy-1 (dm) .28, rproxy-2 (ds-1) .48, rproxy-3 (ds-2) .49
address=/calibre.d.lcamaral.com/192.168.59.28
address=/calibre.d.lcamaral.com/192.168.59.48
address=/calibre.d.lcamaral.com/192.168.59.49

address=/rundeck.d.lcamaral.com/192.168.59.28
address=/rundeck.d.lcamaral.com/192.168.59.48
address=/rundeck.d.lcamaral.com/192.168.59.49

address=/vault.d.lcamaral.com/192.168.59.28
address=/vault.d.lcamaral.com/192.168.59.48
address=/vault.d.lcamaral.com/192.168.59.49

address=/keycloak.d.lcamaral.com/192.168.59.28
address=/keycloak.d.lcamaral.com/192.168.59.48
address=/keycloak.d.lcamaral.com/192.168.59.49

address=/portainer.d.lcamaral.com/192.168.59.28
address=/portainer.d.lcamaral.com/192.168.59.48
address=/portainer.d.lcamaral.com/192.168.59.49

address=/prometheus.d.lcamaral.com/192.168.59.28
address=/prometheus.d.lcamaral.com/192.168.59.48
address=/prometheus.d.lcamaral.com/192.168.59.49

address=/s3.d.lcamaral.com/192.168.59.28
