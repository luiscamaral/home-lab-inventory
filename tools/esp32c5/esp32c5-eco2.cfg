# ESP32-C5 ECO2 (early-silicon sample) openocd override.
#
# This board's JTAG TAP reports IDCODE 0x00005c25 (part 0x0005), while the
# stock openocd target/esp32c5.cfg expects production silicon 0x00017c25
# (part 0x0017). Pre-set _CPUTAPID before sourcing the stock target so the
# newtap -expected-id matches. Requires target/esp32c5.cfg line "set _CPUTAPID"
# to be conditional (if {![info exists _CPUTAPID]} ...); see jtag-openocd.sh.
#
# Usage: openocd -s "$OPENOCD_SCRIPTS" -f tools/esp32c5/esp32c5-eco2.cfg
set _CPUTAPID 0x00005c25
# This eco2 sample exposes only the HP-core TAP; the LP-core TAP is absent
# (reads 0xffffffff). Drop it to a single-tap chain.
set _LP_TAPNUM 0
source [find interface/esp_usb_jtag.cfg]
source [find target/esp32c5.cfg]
